{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LatinForce{% endblock %} | Gestión de Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root{ --lf-sidebar: #0b1220; --lf-sidebar-2: #0f1a2f; }
        .lf-footer{ background: linear-gradient(180deg, var(--lf-sidebar) 0%, var(--lf-sidebar-2) 100%);
            border-top: 1px solid rgba(255,255,255,.08); color: rgba(255,255,255,.7); }
        .lf-footer a{ color: rgba(255,255,255,.85); }
        .lf-footer a:hover{ color: #fff; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="min-vh-100">
    <div>
        {% block body %}{% endblock %}
    </div>
    {% block footer %}
    <footer class="lf-footer py-3 text-center small border-top">
        &copy; {% now "Y" %} LatinForce. Desarrollado por <a href="https://novtiq.com" target="_blank" rel="noopener noreferrer">Novtiq.com</a>
    </footer>
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
