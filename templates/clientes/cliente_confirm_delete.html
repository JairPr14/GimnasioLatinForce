{% extends "base_dashboard.html" %}
{% block page_title %}Eliminar cliente{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Eliminar cliente</h1>
    <a href="{% url 'clientes:list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <p>¿Está seguro que desea eliminar a <strong>{{ cliente.nombre_completo }}</strong>?</p>
        <p class="text-muted small">Esta acción no se puede deshacer.</p>
        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i>Confirmar eliminación
            </button>
        </form>
        <a href="{% url 'clientes:detail' cliente.pk %}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
</div>
{% endblock %}
