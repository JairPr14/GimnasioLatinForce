{% extends "base_dashboard.html" %}
{% block page_title %}Configuración{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Configuración de la empresa</h1>
    <a href="{% url 'dashboard:index' %}" class="btn btn-outline-secondary">Volver</a>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h6 class="mb-0">Logo de la empresa</h6>
            </div>
            <div class="card-body">
                <p class="text-muted small mb-3">El logo se mostrará en la pantalla de inicio de sesión.</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_logo" class="form-label">Subir logo</label>
                        <input type="file" name="logo" id="id_logo" class="form-control" accept="image/*">
                        {% if config.logo %}
                        <div class="mt-2">
                            <p class="small text-muted mb-1">Logo actual:</p>
                            <img src="{{ config.logo.url }}" alt="Logo" style="max-height: 120px; max-width: 100%; object-fit: contain;">
                        </div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-upload me-1"></i>Guardar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
