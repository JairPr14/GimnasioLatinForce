{% extends "base_dashboard.html" %}
{% block page_title %}Eliminar producto{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body p-4">
        <h5 class="card-title">Eliminar producto</h5>
        <p class="text-muted">¿Eliminar <strong>{{ producto.nombre }}</strong> ({{ producto.codigo }})? Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <a href="{% url 'inventario:list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
