{% extends "base_dashboard.html" %}
{% block page_title %}Eliminar adelanto{% endblock %}
{% block content %}
<div class="card lf-card" style="max-width: 480px;">
  <div class="card-body">
    <h2 class="h5 mb-3">¿Eliminar adelanto?</h2>
    <p class="text-muted">S/ {{ object.monto }} del {{ object.fecha|date:"d/m/Y" }} — {{ object.get_descontar_de_display }}</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Eliminar</button>
      <a href="{% url 'trabajadores:adelanto_list' object.trabajador_id %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
