{% extends "base_dashboard.html" %}
{% block page_title %}Actualizar sueldo{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
  <div>
    <h1 class="h3 mb-1">Actualizar sueldo</h1>
    <div class="text-muted">{{ trabajador.nombre_completo }}</div>
  </div>
  <a href="{% url 'trabajadores:sueldo_list' trabajador.pk %}" class="btn btn-outline-secondary">Volver</a>
</div>

<div class="card lf-card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Desde</label>
          {{ form.fecha_inicio }}
        </div>
        <div class="col-md-4">
          <label class="form-label">Sueldo mensual</label>
          {{ form.sueldo_mensual }}
        </div>
        <div class="col-md-4">
          <label class="form-label">Motivo</label>
          {{ form.motivo }}
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg me-1"></i>Guardar</button>
        <a class="btn btn-outline-secondary" href="{% url 'trabajadores:sueldo_list' trabajador.pk %}">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
