{% extends "base_dashboard.html" %}
{% block page_title %}Eliminar usuario{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-end gap-2 mb-3">
  <div>
    <h1 class="h3 mb-1">Eliminar usuario</h1>
    <div class="text-muted">Esta acción no se puede deshacer.</div>
  </div>
  <a href="{% url 'usuarios:usuario_list' %}" class="btn btn-outline-secondary">Volver</a>
</div>

<div class="card lf-card">
  <div class="card-body">
    <p class="mb-3">¿Seguro que deseas eliminar el usuario <strong>{{ object.username }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button class="btn btn-outline-danger" type="submit">
          <i class="bi bi-trash me-1"></i>Eliminar
        </button>
        <a class="btn btn-outline-secondary" href="{% url 'usuarios:usuario_list' %}">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
